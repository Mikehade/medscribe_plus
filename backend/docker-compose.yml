version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# MedScribe+ — full stack
#
# Services:
#   redis      — cache and real-time transcript store
#   api        — FastAPI application
#
# Env resolution order (highest to lowest priority):
#   1. Shell environment variables already exported on the host
#   2. .docker.env   (Docker-specific overrides, gitignored)
#   3. .env          (shared dev defaults, gitignored)
#
# Usage:
#   docker compose up              # start both services
#   docker compose up -d           # detached
#   docker compose down            # stop and remove containers
#   docker compose down -v         # also remove named volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── Redis ─────────────────────────────────────────────────────────────────
  # network_mode: host means Redis binds directly to the Codespaces VM
  # network stack — no port forwarding layer, no HostIp ambiguity.
  redis:
    image: redis:7.2-alpine
    container_name: medscribe_redis
    restart: unless-stopped
    network_mode: host
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --port ${REDIS_PORT:-6379}
    volumes:
      - redis_data:/data
    healthcheck:
      # With host networking, redis-cli reaches localhost directly
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API ───────────────────────────────────────────────────────────────────
  # network_mode: host — the uvicorn process binds directly to port 8000
  # on the VM, which Codespaces port forwarding can see immediately.
  # NOTE: ports: must be omitted with network_mode: host.
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: medscribe_api
    restart: unless-stopped
    network_mode: host
    env_file:
      - path: .docker.env
        required: false
      - path: .env
        required: false
    environment:
      # With host networking both containers share the VM network,
      # so redis is reachable at localhost, not by service name.
      REDIS_HOST: "127.0.0.1"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme}@127.0.0.1:${REDIS_PORT:-6379}/${REDIS_DB:-0}"
    volumes:
      - chroma_data:/app/chroma_db
      - uploads_data:/app/temp_uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  redis_data:
    driver: local
  chroma_data:
    driver: local
  uploads_data:
    driver: local