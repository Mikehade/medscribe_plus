[pytest]
pythonpath = .
filterwarnings =
    ignore:builtin type SwigPyPacked:DeprecationWarning
    ignore:builtin type SwigPyObject:DeprecationWarning
    ignore:builtin type swigvarlink:DeprecationWarning
    ignore::DeprecationWarning
    ignore::Warning
    

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Asyncio mode (auto-detect async tests)
asyncio_mode = auto

# Minimum Python version
minversion = 7.0

# Additional options
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Strict config (fail on config issues)
    --strict-config
    # Disable warnings summary
    --disable-warnings

# Markers for organizing tests
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (uses database)
    e2e: End-to-end tests (full stack)
    slow: Slow running tests
    asyncio: Async tests (auto-added by pytest-asyncio)

# Coverage settings (when using pytest-cov)
[coverage:run]
source = src
omit =
    */tests/*
    */conftest.py
    */__pycache__/*
    */venv/*
    */migrations/*

[coverage:report]
# Fail if coverage is below 80%
fail_under = 80
# Show lines that are not covered
show_missing = true
# Skip covered files in report
skip_covered = false
# Precision for coverage percentage
precision = 2

[coverage:html]
directory = htmlcov

# Ignore certain warnings
filterwarnings =
    # Ignore specific warnings if needed
    # ignore::DeprecationWarning
    # ignore::PendingDeprecationWarning

# Log settings
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Output settings
console_output_style = progress

# Timeout for tests (optional, requires pytest-timeout)
# timeout = 300

# Parallel execution (optional, requires pytest-xdist)
# addopts = -n auto