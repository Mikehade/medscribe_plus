server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Upload size limit ─────────────────────────────────────────────────────
    # Allows audio file uploads up to 100MB.
    # Default nginx limit is 1MB — raises 413 without this.
    client_max_body_size 100M;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # ── Static assets — long cache ────────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy — forward /api/* to the backend on localhost:8000 ──────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # ── WebSocket / WSS upgrade ───────────────────────────────────────────
        # When the page is loaded over HTTPS (Codespaces), the browser requires
        # WSS (wss://) not WS (ws://). nginx handles the upgrade transparently:
        # browser connects wss:// → nginx upgrades → backend receives ws://.
        # The $http_upgrade / $connection_upgrade variables handle both HTTP
        # keep-alive and WebSocket upgrade in the same location block.
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Large body for audio uploads through the proxy
        client_max_body_size 100M;
        proxy_request_buffering off;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # ── SPA fallback — all other routes serve index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check endpoint ─────────────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# ── Connection upgrade map ────────────────────────────────────────────────────
# Maps the Upgrade header to set Connection correctly for both:
#   - Regular HTTP requests → "keep-alive"
#   - WebSocket upgrade requests → "upgrade"
# This must live outside the server block.